<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Nikku ❤️</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffd6e0, #ffe6f0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            width: 95%;
            max-width: 420px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 22px;
        }

        p {
            color: #555;
            font-size: 15px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: #ff4d6d;
            color: white;
            font-size: 16px;
        }

        button:active {
            transform: scale(0.95);
        }

        .message {
            margin-top: 10px;
            font-weight: bold;
            color: #ff4d6d;
            min-height: 40px;
        }

        /* floating hearts */
        .heart {
            position: absolute;
            color: #ff4d6d;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh);
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        /* game */
        .bubble {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ff99aa;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
        }

        /* breathing */
        .breath {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #ff4d6d;
            margin: 10px auto;
            animation: breathe 4s infinite;
        }

        @keyframes breathe {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.5);
            }

            100% {
                transform: scale(1);
            }
        }

        /* hug animation */
        .hug {
            font-size: 40px;
            animation: hugAnim 1s infinite alternate;
        }

        @keyframes hugAnim {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.2);
            }
        }

        /* mood input */
        input {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hey Nikku 💖</h1>
        <p>You are safe. I'm here for you 🌸</p>

        <div class="buttons">
            <button onclick="showMessage()">💌 Sweet Message</button>
            <button onclick="startGame()">🎮 Pop Hearts</button>
            <button onclick="startBreathing()">🫶 Calm Breathing</button>
            <button onclick="giveHug()">🤗 Virtual Hug</button>
        </div>

        <div class="message" id="message"></div>
        <div id="breathing"></div>
        <div id="hug"></div>

        <input type="text" id="mood" placeholder="How are you feeling?" oninput="respondMood()">
    </div>

    <script>
        const messages = [
            "I'm always here for you ❤️",
            "You're stronger than you think 💫",
            "You are loved more than you know 🤍",
            "Everything will be okay 🌸",
            "You matter a lot 💖"
        ];

        function showMessage() {
            document.getElementById("message").innerText = messages[Math.floor(Math.random() * messages.length)];
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerText = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 500);

        function startGame() {
            for (let i = 0; i < 8; i++) {
                const b = document.createElement("div");
                b.className = "bubble";
                b.innerText = "💖";
                b.style.top = Math.random() * 80 + "%";
                b.style.left = Math.random() * 80 + "%";
                b.onclick = b.ontouchstart = () => b.remove();
                document.body.appendChild(b);
                setTimeout(() => b.remove(), 4000);
            }
        }

        function startBreathing() {
            document.getElementById("breathing").innerHTML = "<p>Breathe slowly...</p><div class='breath'></div>";
        }

        function giveHug() {
            document.getElementById("hug").innerHTML = "<div class='hug'>🤗💖🤗</div><p>Sending you a warm hug...</p>";
        }

        function respondMood() {
            const mood = document.getElementById("mood").value.toLowerCase();
            let reply = "";

            if (mood.includes("sad") || mood.includes("cry")) reply = "It's okay to feel this way. I'm here ❤️";
            else if (mood.includes("alone")) reply = "You're not alone, I promise 🤍";
            else if (mood.includes("hurt")) reply = "You didn't deserve that pain 💔";
            else if (mood.length > 3) reply = "I hear you... and I care 💖";

            document.getElementById("message").innerText = reply;
        }
    </script>

</body>

</html>
